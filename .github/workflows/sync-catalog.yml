name: Sync Catalog to Repos

on:
  push:
    branches:
      - main
    paths:
      - 'catalog.json'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout price-data
        uses: actions/checkout@v4

      - name: Read version
        id: catalog
        run: |
          VERSION=$(jq -r '.version' catalog.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate catalog.ts
        run: |
          node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('catalog.json', 'utf8'));
          
          let ts = \`// Auto-generated from price-data
          export interface Service {
            id: string;
            n: string;
            d: string;
            u: string;
            p: number;
          }
          
          export interface Category {
            id: string;
            name: string;
          }
          
          export const VERSION = '\${data.version}';
          export const UPDATED = '\${data.updated}';
          
          export const CATEGORIES: Category[] = \${JSON.stringify(data.categories, null, 2)};
          
          export const CATALOG: Record<string, Service[]> = {
          \`;
          
          for (const [categoryId, services] of Object.entries(data.services)) {
            ts += \`  \${categoryId}: \${JSON.stringify(services, null, 4).split('\\n').join('\\n  ')},\\n\`;
          }
          
          ts += \`};
          
          export const formatCurrency = (value: number): string => {
            if (value === 0) return 'по факту';
            return new Intl.NumberFormat('ru-RU', {
              style: 'currency',
              currency: 'RUB',
              maximumFractionDigits: 0,
            }).format(value);
          };
          
          export const declOfNum = (n: number, titles: [string, string, string]): string => {
            const cases = [2, 0, 1, 1, 1, 2];
            return titles[(n % 100 > 4 && n % 100 < 20) ? 2 : cases[(n % 10 < 5) ? n % 10 : 5]];
          };
          
          export const getCategoryName = (id: string): string => {
            return CATEGORIES.find(c => c.id === id)?.name || '';
          };
          
          const CATALOG_URL = 'https://raw.githubusercontent.com/getto-dev/price-data/main/catalog.json';
          
          export async function checkForUpdates(): Promise<boolean> {
            try {
              const response = await fetch(CATALOG_URL);
              if (!response.ok) return false;
              const data = await response.json();
              console.log('Catalog version:', data.version, 'Updated:', data.updated);
              return true;
            } catch {
              return false;
            }
          }
          \`;
          
          fs.writeFileSync('catalog.ts', ts);
          "

      - name: Checkout price repo
        uses: actions/checkout@v4
        with:
          repository: getto-dev/price
          token: ${{ secrets.PAT_TOKEN }}
          path: price-repo

      - name: Update price repo
        run: |
          cp catalog.ts price-repo/src/lib/catalog.ts
          cd price-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/catalog.ts
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update catalog to v${{ steps.catalog.outputs.version }}"
            git push
          fi

      - name: Checkout check repo
        uses: actions/checkout@v4
        with:
          repository: getto-dev/check
          token: ${{ secrets.PAT_TOKEN }}
          path: check-repo

      - name: Update check repo
        run: |
          cp catalog.ts check-repo/src/lib/catalog.ts
          cd check-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/catalog.ts
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update catalog to v${{ steps.catalog.outputs.version }}"
            git push
          fi

      - name: Summary
        run: |
          echo "### Sync Complete" >> $GITHUB_STEP_SUMMARY
          echo "Version: ${{ steps.catalog.outputs.version }}" >> $GITHUB_STEP_SUMMARY
